services:
  - type: web
    name: nexxi-hub-bot
    runtime: node
    buildCommand: npm install -g pnpm@10 && pnpm install --filter @workspace/api-server --filter @workspace/api-zod --filter @workspace/db && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_TICKET_CATEGORY_ID
        sync: false
      - key: GAMEPASS_MAIN_HUB
        sync: false
    healthCheckPath: /api/healthz
    autoDeploy: true
