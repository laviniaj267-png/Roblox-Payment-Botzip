services:
  - type: web
    name: nexxi-hub-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_TICKET_CATEGORY_ID
        sync: false
      - key: GAMEPASS_MAIN_HUB
        sync: false
    healthCheckPath: /api/healthz
    autoDeploy: true
    disk:
      name: nexxi-data
      mountPath: /app/data
      sizeGB: 1
